services:
  db:
    image: postgres:16-alpine
    container_name: job-tracker-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - job-network

  api:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: job-tracker-api
    ports:
      - "8080:8080"
    environment:
      DB_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:${DB_PORT}/${DB_NAME}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
    networks:
     - job-network
  
  frontend:
    build: 
      context: ./client
      dockerfile: Dockerfile
    container_name: job-tracker-ui
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      - api
    networks:
      - job-network

networks:
  job-network:
    driver: bridge