version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: job-tracker-db
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: jobtracker
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d jobtracker"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - job-network

  api:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: job-tracker-api
    ports:
      - "8080:8080"
    environment:
      DB_URL: postgres://devuser:devpassword@db:5432/jobtracker?sslmode=disable
      JWT_SECRET: local-dev-secret
    depends_on:
      db:
        condition: service_healthy
    networks:
     - job-network
  
  frontend:
    build: 
      context: ./client
      dockerfile: Dockerfile
    container_name: job-tracker-ui
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      - api
    networks:
      - job-network

networks:
  job-network:
    driver: bridge