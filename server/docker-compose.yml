version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: jobtracker
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d jobtracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # We use 'db' because it's the service name above
      DB_URL: postgres://devuser:devpassword@db:5432/jobtracker?sslmode=disable
      JWT_SECRET: local-dev-secret
    depends_on:
      db:
        condition: service_healthy